<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Gentle Care Nursing</title>
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #fcf9f9;
        color: #2d2926;
        display: grid;
        place-items: center;
        padding: 2rem;
        text-align: center;
      }
      .card {
        max-width: 32rem;
        background: white;
        padding: 2.5rem 2rem;
        border-radius: 1.5rem;
        box-shadow: 0 24px 48px -12px rgba(132, 40, 51, 0.08);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        color: #3D0A11;
        letter-spacing: -0.01em;
      }
      p { margin: 0 0 1.5rem; line-height: 1.6; color: #5a544a; }
      .phone {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: #3D0A11;
        color: white;
        text-decoration: none;
        border-radius: 0.75rem;
        font-weight: 600;
      }
      small { display: block; margin-top: 1.5rem; color: #6b6557; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You're offline</h1>
      <p>The Gentle Care Nursing website needs an internet connection to load. If you need urgent help right now, you can call us directly.</p>
      <a class="phone" href="tel:1300004267">Call 1300 004 267</a>
      <small>Reconnect to the internet and reload to continue browsing.</small>
    </main>
  </body>
</html>
